multiprocessing: False
execute_code: False

dataset:
  data_path: /home/xueqing.wu/data/NExTVideo/
  #  data_path: /local/minh/VIPER/datasets/NExTVideo/csvs/  # minh
  dataset_name: NExTQA
  version: multiplechoice
  fps: 1
  max_num_frames: 30
  split: val
  batch_size: 1000000000
  max_samples: 100

#codex:
#  prompt: ./prompts/benchmarks/nextqa.prompt
code_gen:
  model_class: vllm
  specific_model: deepseek-ai/DeepSeek-Coder-V2-Lite-Base # codellama/CodeLlama-7b-Python-hf
  temperature: 1
  prompt: ./prompts/benchmarks/nextqa.completionprompt
#  prompt: ./prompts/benchmarks/nextqa.chatprompt
#  top_p: 0.9
  max_new_tokens: 512
  do_sample: False
  use_tqdm: False

select_answer_prompt: ./prompts/gpt3/video_question.txt
fixed_code_file: ./prompts/fixed_code/blip2_video.prompt

results_dir: ./results/nextqa/

gpt3:
  model: gpt-4o-mini-2024-07-18

load_models: # which code-running stage models to load
  maskrcnn: False
  clip: False
  glip: False
  owlvit: False
  tcl: False
  gpt3_qa: True
  gpt3_general: True
  depth: False
  blip: False
  saliency: False
  xvlm: False